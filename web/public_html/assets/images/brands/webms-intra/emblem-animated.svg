<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="WebMS-Intra emblem"><title>WebMS-Intra emblem (animated)</title>
  <style>
    .spin{transform-origin:0 0;animation:spin 18s linear infinite}
