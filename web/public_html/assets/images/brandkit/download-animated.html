<!doctype html><html><head><meta charset="utf-8"><title>WebMS · animated emblems</title>
<style>
 body{margin:0;background:#f4f5f8;font-family:ui-monospace,monospace;color:#5b6170;padding:40px;text-align:center}
 h1{font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:#23263a;margin:0 0 4px}
 p.s{font-size:12px;color:#8b90a0;max-width:640px;margin:0 auto 30px;line-height:1.6}
 .row{display:flex;gap:26px;justify-content:center;flex-wrap:wrap}
 .card{background:#fff;border:1px solid #e6e8ef;border-radius:18px;padding:24px;width:210px}
 .card img{width:120px;height:120px;display:block;margin:0 auto}
 .nm{margin:14px 0 12px;font-size:13px;color:#23263a;font-weight:bold}
 button{font:inherit;font-size:12px;background:#5e6ad2;color:#fff;border:0;border-radius:9px;padding:9px 14px;cursor:pointer}
 button:hover{background:#4d59c4}
 .all{margin-top:26px}
 .all button{background:#23263a;padding:11px 20px}
</style></head><body>
 <h1>WebMS animated emblems</h1>
 <p class="s">These breathe (scale + glow, 4s, reduced-motion safe). Click to save each as a real <b>.svg</b> file that animates when opened in a browser (Edge, Chrome, Safari). They're built here in your browser, so they keep their animation.</p>
 <div class="row" id="row"></div>
 <div class="all"><button onclick="brands.forEach(b=>dlOne(b))">Download all three</button></div>
<script>
 const SOURCES = {"WebMS":"<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 64 64\" width=\"100%\" height=\"100%\" preserveAspectRatio=\"xMidYMid meet\" role=\"img\" aria-label=\"WebMS emblem\">\n  <title>WebMS emblem (animated)</title>\n  <style>\n    #breathe{ transform-box:fill-box; transform-origin:50% 50%; animation:breathe 4s ease-in-out infinite; }\n    #glow{ animation:glow 4s ease-in-out infinite; }\n    @keyframes breathe{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }\n    @keyframes glow{ 0%,100%{ opacity:0; } 50%{ opacity:.6; } }\n    @media (prefers-reduced-motion: reduce){ #breathe,#glow{ animation:none; } #glow{ opacity:0; } }\n  </style>\n  <defs><linearGradient id=\"WebMS-grad\" gradientUnits=\"userSpaceOnUse\" x1=\"8\" y1=\"6\" x2=\"56\" y2=\"58\"><stop offset=\"0\" stop-color=\"#5e6ad2\"/><stop offset=\"1\" stop-color=\"#7a85e8\"/></linearGradient></defs>\n  <g id=\"breathe\">\n    <g fill=\"url(#WebMS-grad)\"><rect x=\"18.70\" y=\"20.70\" width=\"26.60\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(-90.00 32 23)\"/><rect x=\"7.78\" y=\"39.70\" width=\"29.44\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(139.90 22.5 42)\"/><rect x=\"26.78\" y=\"39.70\" width=\"29.44\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(40.10 41.5 42)\"/><circle cx=\"32\" cy=\"12\" r=\"5\"/><circle cx=\"13\" cy=\"50\" r=\"5\"/><circle cx=\"51\" cy=\"50\" r=\"5\"/><rect x=\"24\" y=\"26\" width=\"16\" height=\"16\" rx=\"5\"/></g>\n    <g id=\"glow\" opacity=\"0\"><g fill=\"#7a85e8\"><rect x=\"18.70\" y=\"20.70\" width=\"26.60\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(-90.00 32 23)\"/><rect x=\"7.78\" y=\"39.70\" width=\"29.44\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(139.90 22.5 42)\"/><rect x=\"26.78\" y=\"39.70\" width=\"29.44\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(40.10 41.5 42)\"/><circle cx=\"32\" cy=\"12\" r=\"5\"/><circle cx=\"13\" cy=\"50\" r=\"5\"/><circle cx=\"51\" cy=\"50\" r=\"5\"/><rect x=\"24\" y=\"26\" width=\"16\" height=\"16\" rx=\"5\"/></g></g>\n  </g>\n</svg>\n","ChurchMS":"<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 64 64\" width=\"100%\" height=\"100%\" preserveAspectRatio=\"xMidYMid meet\" role=\"img\" aria-label=\"ChurchMS emblem\">\n  <title>ChurchMS emblem (animated)</title>\n  <style>\n    #breathe{ transform-box:fill-box; transform-origin:50% 50%; animation:breathe 4s ease-in-out infinite; }\n    #glow{ animation:glow 4s ease-in-out infinite; }\n    @keyframes breathe{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }\n    @keyframes glow{ 0%,100%{ opacity:0; } 50%{ opacity:.6; } }\n    @media (prefers-reduced-motion: reduce){ #breathe,#glow{ animation:none; } #glow{ opacity:0; } }\n  </style>\n  <defs><linearGradient id=\"ChurchMS-grad\" gradientUnits=\"userSpaceOnUse\" x1=\"8\" y1=\"6\" x2=\"56\" y2=\"58\"><stop offset=\"0\" stop-color=\"#5e6ad2\"/><stop offset=\"1\" stop-color=\"#7a85e8\"/></linearGradient></defs>\n  <g id=\"breathe\">\n    <g fill=\"url(#ChurchMS-grad)\"><path d=\"M32,5 L35,17 L49,31 L15,31 L29,17 Z\"/><path fill-rule=\"evenodd\" d=\"M21,30 h22 a3,3 0 0 1 3,3 v18 a3,3 0 0 1 -3,3 h-22 a3,3 0 0 1 -3,-3 v-18 a3,3 0 0 1 3,-3 z M26.5,54 L26.5,43 A5.5,5.5 0 0 1 37.5,43 L37.5,54 Z M32,34.3 m-2.3,0 a2.3,2.3 0 1 0 4.6,0 a2.3,2.3 0 1 0 -4.6,0 z\"/></g>\n    <g id=\"glow\" opacity=\"0\"><g fill=\"#7a85e8\"><path d=\"M32,5 L35,17 L49,31 L15,31 L29,17 Z\"/><path fill-rule=\"evenodd\" d=\"M21,30 h22 a3,3 0 0 1 3,3 v18 a3,3 0 0 1 -3,3 h-22 a3,3 0 0 1 -3,-3 v-18 a3,3 0 0 1 3,-3 z M26.5,54 L26.5,43 A5.5,5.5 0 0 1 37.5,43 L37.5,54 Z M32,34.3 m-2.3,0 a2.3,2.3 0 1 0 4.6,0 a2.3,2.3 0 1 0 -4.6,0 z\"/></g></g>\n  </g>\n</svg>\n","WebMS-Intra":"<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 64 64\" width=\"100%\" height=\"100%\" preserveAspectRatio=\"xMidYMid meet\" role=\"img\" aria-label=\"WebMS-Intra emblem\">\n  <title>WebMS-Intra emblem (animated)</title>\n  <style>\n    #breathe{ transform-box:fill-box; transform-origin:50% 50%; animation:breathe 4s ease-in-out infinite; }\n    #glow{ animation:glow 4s ease-in-out infinite; }\n    @keyframes breathe{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }\n    @keyframes glow{ 0%,100%{ opacity:0; } 50%{ opacity:.6; } }\n    @media (prefers-reduced-motion: reduce){ #breathe,#glow{ animation:none; } #glow{ opacity:0; } }\n  </style>\n  <defs><linearGradient id=\"WMIntra-grad\" gradientUnits=\"userSpaceOnUse\" x1=\"8\" y1=\"6\" x2=\"56\" y2=\"58\"><stop offset=\"0\" stop-color=\"#5e6ad2\"/><stop offset=\"1\" stop-color=\"#7a85e8\"/></linearGradient></defs>\n  <g id=\"breathe\">\n    <path fill=\"none\" stroke=\"url(#WMIntra-grad)\" stroke-width=\"3\" stroke-linecap=\"round\" d=\"M39,60 H45 A15,15 0 0 0 60,45 V19 A15,15 0 0 0 45,4 H19 A15,15 0 0 0 4,19 V45 A15,15 0 0 0 19,60 H25\"/><g transform=\"translate(7.680 7.680) scale(0.76)\" fill=\"url(#WMIntra-grad)\"><rect x=\"18.70\" y=\"20.70\" width=\"26.60\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(-90.00 32 23)\"/><rect x=\"7.78\" y=\"39.70\" width=\"29.44\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(139.90 22.5 42)\"/><rect x=\"26.78\" y=\"39.70\" width=\"29.44\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(40.10 41.5 42)\"/><circle cx=\"32\" cy=\"12\" r=\"5\"/><circle cx=\"13\" cy=\"50\" r=\"5\"/><circle cx=\"51\" cy=\"50\" r=\"5\"/><rect x=\"24\" y=\"26\" width=\"16\" height=\"16\" rx=\"5\"/></g>\n    <g id=\"glow\" opacity=\"0\"><path fill=\"none\" stroke=\"#7a85e8\" stroke-width=\"3\" stroke-linecap=\"round\" d=\"M39,60 H45 A15,15 0 0 0 60,45 V19 A15,15 0 0 0 45,4 H19 A15,15 0 0 0 4,19 V45 A15,15 0 0 0 19,60 H25\"/><g transform=\"translate(7.680 7.680) scale(0.76)\" fill=\"#7a85e8\"><rect x=\"18.70\" y=\"20.70\" width=\"26.60\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(-90.00 32 23)\"/><rect x=\"7.78\" y=\"39.70\" width=\"29.44\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(139.90 22.5 42)\"/><rect x=\"26.78\" y=\"39.70\" width=\"29.44\" height=\"4.60\" rx=\"2.30\" transform=\"rotate(40.10 41.5 42)\"/><circle cx=\"32\" cy=\"12\" r=\"5\"/><circle cx=\"13\" cy=\"50\" r=\"5\"/><circle cx=\"51\" cy=\"50\" r=\"5\"/><rect x=\"24\" y=\"26\" width=\"16\" height=\"16\" rx=\"5\"/></g></g>\n  </g>\n</svg>\n"};
 const brands = ["WebMS","ChurchMS","WebMS-Intra"];
 const fname = b => b.toLowerCase()+'-emblem-animated.svg';
 function dlOne(b){ const blob=new Blob([SOURCES[b]],{type:'image/svg+xml'}); const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=fname(b); document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
 const row=document.getElementById('row');
 brands.forEach(b=>{
   const img='data:image/svg+xml;utf8,'+encodeURIComponent(SOURCES[b]);
   const c=document.createElement('div'); c.className='card';
   c.innerHTML='<img src="'+img+'" alt="'+b+'"><div class="nm">'+b+'</div><button>Download .svg</button>';
   c.querySelector('button').onclick=()=>dlOne(b);
   row.appendChild(c);
 });
</script>
</body></html>
