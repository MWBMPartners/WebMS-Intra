<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440.73 85.29" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="ChurchMS — CHURCH MANAGEMENT SYSTEM">
  <title>ChurchMS — CHURCH MANAGEMENT SYSTEM</title>
  <desc>Primary lockup: emblem (height matched to the title+descriptor block) + wordmark + descriptor (justified to the title width). Church silhouette: a gable roof whose central peak rises into an integrated steeple, over a nave body with an arched door and rose window. Wordmark text is outlined from Plus Jakarta Sans (prefix 700, &#34;MS&#34; 800, descriptor 600) — no font dependency. HOW TO RECOLOUR: every colour is a named token in <defs> (brand, ink, grey, etc.) referenced by fill=&#34;url(#token)&#34;. Edit a token&#39;s stop-color(s) once to recolour everywhere it is used.</defs></desc>
  <defs>
    <linearGradient id="brand" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="1" y2="1"><desc>BRAND token — primary indigo gradient. Edit these two stop-colors to recolour the brand (emblem + &#34;MS&#34;) everywhere it is referenced via fill=&#34;url(#brand)&#34;.</desc><stop offset="0" stop-color="#5e6ad2"></stop><stop offset="1" stop-color="#7a85e8"></stop></linearGradient>
    <linearGradient id="ink"><desc>INK token — wordmark prefix (near-black). Edit the stop-colors to recolour everything referencing fill=&#34;url(#ink)&#34;.</desc><stop offset="0" stop-color="#23263a"></stop><stop offset="1" stop-color="#23263a"></stop></linearGradient>
    <linearGradient id="grey"><desc>GREY token — descriptor / subtag. Edit the stop-colors to recolour everything referencing fill=&#34;url(#grey)&#34;.</desc><stop offset="0" stop-color="#8b90a0"></stop><stop offset="1" stop-color="#8b90a0"></stop></linearGradient>
  </defs>
  <g id="emblem" fill="url(#brand)" transform="translate(-22.272 -5.091) scale(1.6181)">
