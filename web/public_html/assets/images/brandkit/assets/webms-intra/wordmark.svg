<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-9.30 -58.45 338.87 69.22" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="WebMS-Intra">
  <title>WebMS-Intra</title>
  <desc>WebMS wordmark plus a half-height, light-grey &#34;Intra&#34; suffix marking the internal portal. Wordmark text is outlined from Plus Jakarta Sans (Web 700, MS 800, Intra 600, descriptor 600) — no font dependency. HOW TO RECOLOUR: every colour is a named token in <defs> (brand, ink, grey, intra, on-brand) referenced by url(#token). Edit a token&#39;s stop-color(s) once to recolour everywhere it is used.</defs></desc>
  <defs>
    <linearGradient id="brand" gradientUnits="userSpaceOnUse" x1="148.4" y1="-48.448" x2="240.13600000000002" y2="0.768"><desc>BRAND token — primary indigo gradient. Edit these two stop-colors to recolour the brand everywhere it is referenced via fill/stroke=&#34;url(#brand)&#34;.</desc><stop offset="0" stop-color="#5e6ad2"></stop><stop offset="1" stop-color="#7a85e8"></stop></linearGradient>
    <linearGradient id="ink"><desc>INK token — wordmark prefix (near-black). Edit the stop-colors to recolour everything referencing url(#ink).</desc><stop offset="0" stop-color="#23263a"></stop><stop offset="1" stop-color="#23263a"></stop></linearGradient>
    <linearGradient id="intra"><desc>INTRA token — the half-height &#34;Intra&#34; suffix word. Edit the stop-colors to recolour everything referencing url(#intra).</desc><stop offset="0" stop-color="#a3a9b6"></stop><stop offset="1" stop-color="#a3a9b6"></stop></linearGradient>
  </defs>
