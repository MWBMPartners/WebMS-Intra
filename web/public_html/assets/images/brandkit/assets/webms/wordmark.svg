  <title>WebMS</title>
  <desc>One continuous wordmark, no space: heavy &#34;Web&#34; + &#34;MS&#34;. Wordmark text is outlined from Plus Jakarta Sans (prefix 700, &#34;MS&#34; 800, descriptor 600) — no font dependency. HOW TO RECOLOUR: every colour is a named token in <defs> (brand, ink, grey, etc.) referenced by fill=&#34;url(#token)&#34;. Edit a token&#39;s stop-color(s) once to recolour everywhere it is used.</defs></desc>
  <defs>
    <linearGradient id="brand" gradientUnits="userSpaceOnUse" x1="148.4" y1="-48.448" x2="240.13600000000002" y2="0.768"><desc>BRAND token — primary indigo gradient. Edit these two stop-colors to recolour the brand (emblem + &#34;MS&#34;) everywhere it is referenced via fill=&#34;url(#brand)&#34;.</desc><stop offset="0" stop-color="#5e6ad2"></stop><stop offset="1" stop-color="#7a85e8"></stop></linearGradient>
    <linearGradient id="ink"><desc>INK token — wordmark prefix (near-black). Edit the stop-colors to recolour everything referencing fill=&#34;url(#ink)&#34;.</desc><stop offset="0" stop-color="#23263a"></stop><stop offset="1" stop-color="#23263a"></stop></linearGradient>
