  .card{background:#fff;border:1px solid #e6e8ef;border-radius:18px;padding:26px 36px;text-align:center}
  .card .lab{margin-top:14px;font-size:12px;letter-spacing:.08em;color:#9aa0ad}
  .breathe{transform-box:fill-box;transform-origin:50% 50%;animation:breathe 4s ease-in-out infinite}

  @keyframes glow{0%,100%{opacity:0}50%{opacity:.6}}
  @media (prefers-reduced-motion: reduce){.breathe,.glow{animation:none}.glow{opacity:0}}
