# =============================================================================
# CodeQL Analysis
# =============================================================================
# Runs GitHub's CodeQL static analyser on every PR and weekly on `main`.
# Targets the JavaScript/TypeScript surface of the repo — that's what
# CodeQL natively supports for our stack. PHP static analysis is handled
# in php-static-analysis.yml using Psalm.
#
# Scans:
#   - web/public_html/assets/js/   (portal.js, etc.)
#   - web/public_html/             (any inline <script> blocks in PHP files
#                                    are NOT scanned by CodeQL — those are
#                                    too embedded for the JS analyser).
#
# CodeQL also surfaces results in the Security tab → Code scanning.
# =============================================================================

name: "CodeQL"

on:
  push:
    branches: [main, beta, alpha]
  pull_request:
    branches: [main, beta, alpha]
  schedule:
    # Weekly Monday 09:00 UTC re-scan to catch new advisories that match
    # already-shipped code.
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyse:
    name: Analyse JavaScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality
          # Limit to the actual JS sources so the analyser doesn't try to
          # parse our PHP files as JS.
          source-root: web/public_html/assets/js

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
