# ===============================
# GitHub Action - FTP Deploy
# ===============================
# Single-branch deployment model:
#   - Push to main  -> public_html_dev/  (dev, automatic)
#   - Tagged v*     -> public_html/      (production, automatic)
#   - Manual        -> choice of target  (override)
#
# All development happens on main. The dev site always has the latest
# code. Production only updates when a version tag is pushed.
#
# Required secrets: DH_HOST, DH_USER, DH_PASS
# -----------------------------------------------
name: Deploy to DreamHost

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - live

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Map targets to remote paths
    env:
      FTP_HOST: ${{ secrets.DH_HOST }}
      FTP_USER: ${{ secrets.DH_USER }}
      FTP_PASS: ${{ secrets.DH_PASS }}
      REMOTE_DEV:  portal.millrdsdacambridge.uk/public_html_dev
      REMOTE_LIVE: portal.millrdsdacambridge.uk/public_html

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select target path
        id: set-path
        run: |
          echo "::group::Select remote path"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch -- respect user choice
            case "${{ github.event.inputs.target }}" in
              dev)  echo "path=${REMOTE_DEV}"  >> $GITHUB_OUTPUT;;
              live) echo "path=${REMOTE_LIVE}" >> $GITHUB_OUTPUT;;
              *)    echo "::error::Invalid target" && exit 1;;
            esac
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tagged release -- deploy to production
            echo "path=${REMOTE_LIVE}" >> $GITHUB_OUTPUT
          else
            # Push to main -- deploy to dev
            echo "path=${REMOTE_DEV}" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Lint PHP
        run: |
          echo "::group::PHP Lint"
          find . -type f -name "*.php" -not -path "*/vendor/*" -print0 | xargs -0 -n1 -P4 php -l
          echo "::endgroup::"

      - name: Sync via lftp
        uses: sebastianpopp/ftp-action@v1
        with:
          host:   ${{ env.FTP_HOST }}
          user:   ${{ env.FTP_USER }}
          pass:   ${{ env.FTP_PASS }}
          local:  ./
          remote: ${{ steps.set-path.outputs.path }}
          args:   "--verbose --parallel=4 --delete --exclude .git* --exclude .claude/"

      - name: Health check
        run: |
          # Extract domain from remote path for health check URL
          DOMAIN=$(echo "${{ steps.set-path.outputs.path }}" | cut -d'/' -f1)
          curl -fsSL "https://${DOMAIN}/health" || echo "Health endpoint not responding; continuing"
