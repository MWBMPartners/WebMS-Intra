# PURPOSE
# -------
# Bridges GitHub's GITHUB_TOKEN anti-recursion rule for merges into beta
# and main. Without this, a merged PR on those branches does NOT fire the
# `Deploy via SFTP` workflow on `push:`, because the merge commit is
# attributed to GITHUB_TOKEN.
#
# `workflow_dispatch` is one of the two event types GITHUB_TOKEN IS
# allowed to fire. We exploit that: this workflow starts on the PR open
# event (which fires from any actor), polls until the PR is merged, then
# dispatches `deploy.yml` on the base branch via `gh workflow run`.
#
# The same pattern is used by auto-merge-alpha.yml for the alpha branch.
# This file deliberately does NOT cover alpha (that one already has its
# bridge, paired with the auto-merge feature). Triggering both for alpha
# would dispatch deploy.yml twice — wasteful, but not harmful (the deploy
# uses --only-newer and a kill switch).
#
# Trade-off: polling holds a runner busy for up to one hour per open PR
# against beta or main. For a solo-dev / low-PR-volume repo this is
# acceptable. If PR volume grows, replace this with a webhook-driven
# external bridge (Cloudflare Worker, Pipedream, etc.).
# =============================================================================

name: Post-merge deploy bridge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - beta
      - main

permissions:
  contents: read
  actions: write       # required for `gh workflow run`
  pull-requests: read

# One watcher per PR. New synchronise events cancel old watchers to avoid
# multiple jobs racing to dispatch the same deploy.
concurrency:
  group: post-merge-bridge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  watch-and-dispatch:
    name: Watch PR and dispatch deploy on merge
    runs-on: ubuntu-latest

    # Skip drafts — a draft PR can't merge, so polling would just burn the
    # full hour timeout for nothing.
    if: github.event.pull_request.draft == false

    steps:
      - name: Wait for merge and dispatch deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          echo "Watching PR #$PR_NUMBER against $BASE for merge..."
          for i in $(seq 1 120); do  # 120 * 30s = 60 min max
            STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state -q .state)
            case "$STATE" in
              MERGED)
                echo "PR #$PR_NUMBER merged → dispatching deploy.yml on $BASE"
                gh workflow run deploy.yml --repo "$REPO" --ref "$BASE"
                exit 0
                ;;
              CLOSED)
                echo "PR #$PR_NUMBER closed without merging — no deploy"
                exit 0
                ;;
            esac
            echo "  PR #$PR_NUMBER state=$STATE (poll $i/120) — sleeping 30s"
            sleep 30
          done
          echo "::warning::Timed out after 60 min waiting for PR #$PR_NUMBER to merge. If it merges later, dispatch deploy manually:"
          echo "::warning::  gh workflow run deploy.yml --ref $BASE"
          exit 0
