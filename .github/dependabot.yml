# =============================================================================
# Dependabot configuration
# =============================================================================
# Watches for security + version updates in:
#   - GitHub Actions (workflow versions)
#   - npm (none yet — placeholder so adding a package.json later auto-picks up)
#   - Composer (placeholder — see #145 for composer.json work)
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# =============================================================================

version: 2

updates:
  # GitHub Actions — keep workflow versions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "type: infrastructure"
      - "scope: ci"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      # Bundle multiple action bumps into one PR
      gh-actions:
        patterns:
          - "*"
